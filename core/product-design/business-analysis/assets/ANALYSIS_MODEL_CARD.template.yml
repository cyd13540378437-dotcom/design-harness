usage_prompts:
  decision_relevance_prompt: |
    判断本模型是否会改变 Choice Set、选项后果、当前推荐或置信度；若不会，停止使用。
  routing_prompt: |
    判断模型适配与最低输入。
  user_input_prompt: |
    仅在缺少会改变选择的关键输入时，用简体中文提出最多 1–2 个问题。
  execution_prompt: |
    执行模型分析，不虚构数据。
  analysis_run_prompt: |
    写入中文 Analysis Workspace 或 Analysis Run，并明确 Choice Delta。
  conclusion_prompt: |
    只向中央综合器返回：受影响选项、推荐候选、接受代价和改变推荐的条件；不直接向用户收尾。
  misuse_guard_prompt: |
    检查模型误用、伪精确、问题漂移，以及是否用 Assurance 替代 Recommendation。
