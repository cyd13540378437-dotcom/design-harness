schema_version: 1
model_id: sipoc-bottleneck
title: SIPOC / 瓶颈分析
category: process-operations
status: ready
purpose:
- 界定流程边界、输入输出、参与方和主要瓶颈。
- 处理业务流程、责任、交付效率和运营卡点问题。
use_when:
- 用户提出流程困境、审批规则、交付卡点、退款/支持/实施流程问题。
avoid_when:
- 问题主要是宏观市场或财务投资判断。
- 没有任何流程事件或参与者线索。
decision_questions:
- 这个流程从哪里开始到哪里结束？
- 谁提供输入，谁接收输出？
- 瓶颈发生在哪一步？
- 是否是责任不清还是能力不足？
required_inputs:
- 流程目标
- 参与者
- 至少一个实际流程事件或卡点
minimum_viable_inputs:
- 一个具体流程和一个卡点
outputs:
- SIPOC 表
- 瓶颈位置
- 可能原因
- 改进选项
- 流程风险
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Basis / 决策范围
- Decision Basis / 关键线索
- ANALYSIS_WORKSPACE.md / 专业分析
- Decision Core / Choice Set
- Decision Basis / 主要权衡
interaction_prompts:
- 这个流程从哪个动作开始，到哪个结果结束？
- 最常卡在哪一步？
- 谁在等谁？
usage_prompts:
  decision_relevance_prompt: 在使用《SIPOC / 瓶颈分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。当用户问题涉及流程、审批、交付、责任或运营卡点时使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision
    Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    让用户讲一个具体案例，再从案例中还原 Supplier/Input/Process/Output/Customer。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。建立流程边界和主要步骤，定位瓶颈，区分瓶颈是能力、责任、规则、信息还是资源问题。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Analysis Workspace，并更新范围、线索、方案和权衡。
    输出必须包含 Choice Delta。 结果优先写入中文 `ANALYSIS_WORKSPACE.md`；独立 Analysis Run 文件仅在 deep / audit 或结果需要单独追溯时创建。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出选择：A调整规则、B补责任人、C简化流程、D先收集更多流程证据。 向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否流程边界过大、是否跳到解决方案、是否没有责任主体。 检查是否用 Assurance 替代 Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。
    若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 把流程图画大而空
- 直接给方案不诊断瓶颈
- 忽略责任主体
- 忽略异常场景
quality_checks:
- 是否有流程起止
- 是否有参与方
- 是否定位瓶颈
- 是否区分瓶颈类型
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- raci
- risk-matrix
- option-assessment
- validation-planning
example_analysis_run:
- 退款是否二级审批 → SIPOC 找到责任、输入、输出和审批瓶颈，再做方案评估。
output_language: zh-CN
runtime_role: professional_analysis
