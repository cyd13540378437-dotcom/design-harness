schema_version: 1
model_id: scenario-sensitivity
title: 情景与敏感性分析
category: finance-risk
status: ready
purpose:
- 在不确定性高时比较保守、基准、乐观情景。
- 识别最影响结论的关键变量。
use_when:
- 变量多且不确定。
- 需要判断结果对价格、成本、转化率、留存、使用量等变量的敏感性。
avoid_when:
- 没有任何可变因素或指标线索。
- 问题只是输入理解阶段。
decision_questions:
- 在保守/基准/乐观情况下结论是否变化？
- 哪个变量最能改变选择？
- 应优先验证哪个变量？
required_inputs:
- 候选方案
- 关键变量
- 变量范围或至少方向性假设
- 目标结果
minimum_viable_inputs:
- 一个候选方案和 2–3 个关键变量
outputs:
- 情景表
- 敏感变量
- 结论边界
- 验证优先级
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Basis / 重要假设
- ANALYSIS_WORKSPACE.md / 专业分析
- Decision Basis / 主要权衡
- Decision Memory / 验证方式
- Decision Memory / 复审条件
interaction_prompts:
- 如果转化率只有预期一半，这个方案还成立吗？
- 哪个变量最可能让你改变决定？
usage_prompts:
  decision_relevance_prompt: 在使用《情景与敏感性分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。当结论依赖多个不确定变量时使用。尤其适合数据不足但需要条件性建议的情况。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    让用户给范围而非精确数字：低/中/高，保守/基准/乐观。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。构建至少两种情景，识别结论是否稳健，指出关键敏感变量。不要制造伪精确。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Analysis Workspace，并更新重要假设、验证方式、复审条件。
    输出必须包含 Choice Delta。 结果优先写入中文 `ANALYSIS_WORKSPACE.md`；独立 Analysis Run 文件仅在 deep / audit 或结果需要单独追溯时创建。
  conclusion_prompt: 本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出。说明哪些真实业务选项在保守、基准和乐观情景下成立或失效，哪个变量改变了选项排序，以及当前应选择、缩小、验证还是暂缓的业务含义。
    向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式
    Schema、公式权重、样例数据、代码或执行提议。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否把情景当预测、是否范围无来源、是否没有敏感变量。 检查是否用 Assurance 替代 Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。
    若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 过度精确
- 把情景当预测
- 没有变量范围
- 没有验证优先级
quality_checks:
- 是否有多情景
- 是否识别敏感变量
- 是否说明限制
- 是否连接验证
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- unit-economics
- npv-analysis
- assumption-mapping
- validation-planning
example_analysis_run:
- 企业版投资在乐观转化率下成立、保守情景不成立 → 先验证支付意愿。
output_language: zh-CN
runtime_role: professional_analysis
