schema_version: 1
model_id: pestel
title: PESTEL 宏观环境分析
category: strategy-environment
status: ready
purpose:
- 扫描政治、经济、社会、技术、环境、法律等外部因素。
- 判断外部环境是否改变商业机会或风险。
use_when:
- 进入新市场、受政策/技术/社会趋势影响较大的问题。
- 用户问“为什么是现在”或外部变化。
avoid_when:
- 局部业务规则。
- 内部流程问题。
- 没有外部环境相关性。
decision_questions:
- 哪些宏观因素支持或威胁该方向？
- 外部变化是否足以改变时机或风险？
required_inputs:
- 目标市场或行业
- 地理范围
- 外部变化线索
minimum_viable_inputs:
- 一个市场/行业和至少一个外部变化线索
outputs:
- PESTEL 因素清单
- 机会/威胁
- 需验证外部假设
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 2. 为什么现在需要处理
- 4. 关键线索
- 6. 重要假设
- 8. 专业分析工作区
- 11. 反方观点 / 不做会怎样
interaction_prompts:
- 这个机会主要来自政策、技术、客户行为还是竞争变化？
- 是否有某个外部变化让这件事变得紧迫？
usage_prompts:
  decision_relevance_prompt: 在使用《PESTEL 宏观环境分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。用于外部环境扫描，不用于解决内部执行细节。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    只问与当前 Case 相关的外部因素，不要求用户完整填写六类。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。按 P/E/S/T/E/L 扫描，但只保留与决策相关因素；标注事实/假设/未知。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 Analysis Workspace，并更新 why now、线索、假设、反方。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出 A外部时机支持推进、B风险较高先观察、C先验证关键外部假设。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否过宽、是否写成宏观百科、是否没有连接当前选择。
common_misuses:
- 宏观罗列
- 不连接决策
- 忽略范围
- 把趋势当确定性
quality_checks:
- 是否与当前选择相关
- 是否标注不确定性
- 是否有 why now 影响
- 是否有验证点
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- swot-tows
- porter-five-forces
- risk-matrix
- validation-planning
example_analysis_run:
- 进入教育行业 → 政策采购、预算周期、AI 接受度、数据隐私都可能影响时机。
output_language: zh-CN
