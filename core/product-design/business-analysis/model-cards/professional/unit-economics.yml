schema_version: 1
model_id: unit-economics
title: 单位经济分析
category: finance-economics
status: ready
purpose:
- 判断单用户、单客户、单交易或单业务单位是否能贡献正向经济价值。
- 帮助分析收入、变动成本、服务成本和规模化风险。
use_when:
- 涉及定价、客户分层、服务成本、毛利、扩张是否可持续。
- 用户问某类客户是否值得服务。
avoid_when:
- 没有任何收入或成本线索。
- 问题主要是战略定位或流程责任，尚未进入经济性判断。
decision_questions:
- 每个单位创造多少收入？
- 每个单位产生多少成本？
- 规模扩大后成本是否可控？
required_inputs:
- 计费单位或业务单位
- 单位收入
- 单位变动成本
- 服务/支持成本
- 获客或交付成本线索
minimum_viable_inputs:
- 一个明确单位和粗略收入/成本范围
outputs:
- 单位收入
- 单位成本
- 贡献毛利
- 敏感成本项
- 需要验证的经济假设
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 6. 重要假设
- 8. 专业分析工作区
- 10. 主要权衡
- 12. 当前结论
- 13. 验证方式
interaction_prompts:
- 这个客户/交易/Seat 大致带来多少收入？
- 最主要随使用增长的成本是什么？
- 是否存在人工服务成本？
usage_prompts:
  decision_relevance_prompt: 在使用《单位经济分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。当问题涉及某类客户、计费单位或服务模式是否可持续时使用。若没有最小收入/成本线索，只能输出待补证据。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    先问单位是什么：用户、客户、Seat、Workspace、交易还是服务单。再问收入和主要变动成本范围。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。估算单位收入、单位成本、贡献毛利和敏感变量。明确哪些数字来自用户，哪些只是待验证假设。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 Analysis Workspace，并更新假设、权衡、验证方式。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出选择：A继续该模式、B提高价格/限制范围、C降低服务成本、D先验证成本。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否伪造成本、是否忽略人工服务、是否把粗算当精确财务结论。
common_misuses:
- 只算收入不算成本
- 忽略人工服务成本
- 把粗略假设写成事实
- 不说明敏感变量
quality_checks:
- 是否明确单位
- 是否列出收入/成本来源
- 是否有敏感变量
- 是否标注假设
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- scenario-sensitivity
- npv-analysis
- option-assessment
- validation-planning
example_analysis_run:
- 企业版客户 ARPA 高但实施成本也高 → 单位经济判断是否值得试点。
output_language: zh-CN
