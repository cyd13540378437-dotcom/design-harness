schema_version: 1
model_id: npv-analysis
title: 净现值分析
category: finance-economics
status: ready
purpose:
- 判断有明确投资额和未来现金流的项目，在考虑时间价值后是否创造正向经济价值。
- 比较多个投资方案的财务吸引力。
use_when:
- 有明确初始投入、时间周期、未来现金流估计和折现率。
- 决策确实涉及投资回报判断。
avoid_when:
- 没有现金流估计。
- 早期方向探索。
- 问题主要是客户需求、流程责任或战略定位。
- 输入数字明显拍脑袋且无法说明来源。
decision_questions:
- 这个项目在财务上是否值得投入？
- 哪个方案考虑时间价值后更优？
- 结果对现金流假设有多敏感？
required_inputs:
- 初始投资额
- 时间周期
- 每期预期现金流
- 折现率
- 关键假设来源
minimum_viable_inputs:
- 初始投资范围
- 至少 3 个期间现金流估计
- 一个明确折现率假设
- 至少一种情景
outputs:
- NPV 结果
- 关键敏感变量
- 情景比较
- 是否适合形成财务建议
- 是否需要先补证据
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Basis / 重要假设
- Decision Basis / 相关证据
- ANALYSIS_WORKSPACE.md / 专业分析
- Decision Basis / 主要权衡
- Decision Core / 当前推荐
- Decision Memory / 验证方式
interaction_prompts:
- 这个判断是否已经有大致现金流假设？A 有投入和收入/成本预测；B 只有粗略投入；C 早期想法；D 不确定。
- 收入和成本预测来自数据、历史经验还是粗略估计？
usage_prompts:
  decision_relevance_prompt: 在使用《净现值分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。只有同时满足初始投入、时间周期、现金流、折现率和投资回报问题时才使用。否则改用 scenario-sensitivity、unit-economics 或 validation-planning。
    若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    先问用户是否有现金流假设。若选择 B/C/D，不要强行计算 NPV。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。基于用户提供的现金流执行 NPV。列出所有输入假设，不得补造现金流。结果只能作为财务视角。指出敏感变量。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Analysis Workspace：initial_investment、time_horizon、cash_flows、discount_rate、npv_result、sensitivity、limitations。
    输出必须包含 Choice Delta。 结果优先写入中文 `ANALYSIS_WORKSPACE.md`；独立 Analysis Run 文件仅在 deep / audit 或结果需要单独追溯时创建。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    数据充分时输出推进/缩小投入/先验证/暂不投入；数据不足时输出补现金流/单位经济/小试点/暂停财务判断。 向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否没有现金流却计算、是否把系统假设伪装成用户数据、是否过度精确、是否把 NPV 正数等同必须做。 检查是否用
    Assurance 替代 Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision
    Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 没有现金流也强行计算
- 过度精确
- 忽略战略价值和执行风险
- NPV 正数直接等于应该做
quality_checks:
- 是否有必要输入
- 是否说明假设来源
- 是否有敏感变量
- 是否区分财务结论和商业决定
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- scenario-sensitivity
- unit-economics
- risk-matrix
- option-assessment
example_analysis_run:
- 若企业版投入 50 万且有三年现金流预测，可做 NPV；若没有现金流，只能建议先做情景分析。
output_language: zh-CN
runtime_role: professional_analysis
