schema_version: 1
model_id: risk-matrix
title: 风险矩阵
category: risk-management
status: ready
purpose:
- 按概率和影响识别、排序和处理风险。
- 帮助用户理解做与不做的风险，不把风险写成泛泛列表。
use_when:
- 方案存在明显执行、合规、财务、客户、运营或声誉风险。
- 需要比较不同选项的风险。
avoid_when:
- 风险极低且可逆的局部问题可轻量使用。
- 没有任何具体方案或风险事件。
decision_questions:
- 风险事件是什么？
- 发生概率和影响如何？
- 有哪些早期信号？
- 如何预防或应对？
required_inputs:
- 候选方案
- 至少一个具体风险事件
- 影响对象或后果
minimum_viable_inputs:
- 一个方案和一个风险事件
outputs:
- 风险清单
- 概率/影响等级
- 早期信号
- 预防措施
- 应对措施
- 剩余风险
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- ANALYSIS_WORKSPACE.md / 专业分析
- Decision Basis / 主要权衡
- Decision Basis / 反方分析
- Decision Memory / 验证方式
- Decision Memory / 复审条件
interaction_prompts:
- 如果这个方案失败，最可能是哪类失败？A 客户不买；B 成本过高；C 执行拖延；D 合规风险；E 其他。
- 哪个风险一旦发生最难挽回？
usage_prompts:
  decision_relevance_prompt: 在使用《风险矩阵》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。当 Case 存在明确风险事件时使用。不要把风险写成抽象词，必须写成可观察事件。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    用失败事件收集风险，而不是问“有哪些风险”。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。列出风险事件、原因、概率、影响、早期信号、预防、应对、剩余风险。概率可以粗分，但必须说明主观性。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Analysis Workspace，并更新权衡、反方、验证和复审条件。
    输出必须包含 Choice Delta。 结果优先写入中文 `ANALYSIS_WORKSPACE.md`；独立 Analysis Run 文件仅在 deep / audit 或结果需要单独追溯时创建。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出选择：A接受风险推进、B降低风险后推进、C缩小范围、D暂缓或放弃。 向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否风险过于抽象、是否没有早期信号、是否没有应对措施、是否概率伪精确。 检查是否用 Assurance
    替代 Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope
    Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 风险写成标签
- 没有风险事件
- 概率伪精确
- 没有缓解措施
- 忽略剩余风险
quality_checks:
- 是否有具体事件
- 是否有概率/影响
- 是否有早期信号
- 是否有应对措施
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- counterfactual-opposition
- option-assessment
- premortem
- validation-planning
example_analysis_run:
- 做企业版风险：服务成本失控、销售周期过长、合规承诺无法履行。
output_language: zh-CN
runtime_role: professional_analysis
