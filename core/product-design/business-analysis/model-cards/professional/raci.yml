schema_version: 1
model_id: raci
title: RACI 责任分工分析
category: process-operations
status: ready
purpose:
- 明确流程或决策中谁负责、谁批准、谁咨询、谁知会。
- 处理责任不清、审批冲突和跨角色协作问题。
use_when:
- 流程、审批、交付、客户成功、内外部协作问题。
- 用户问“谁应该负责/审批”。
avoid_when:
- 市场/财务/战略方向判断。
- 没有多个角色参与。
decision_questions:
- 谁 Responsible？谁 Accountable？谁 Consulted？谁 Informed？
- 当前冲突是否来自责任不清？
required_inputs:
- 流程或任务
- 参与角色
- 决策或交付节点
minimum_viable_inputs:
- 一个流程节点和至少两个角色
outputs:
- RACI 表
- 责任冲突
- 审批风险
- 改进选项
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Basis / 决策范围
- ANALYSIS_WORKSPACE.md / 专业分析
- Decision Core / Choice Set
- Decision Basis / 主要权衡
interaction_prompts:
- 这个动作最终谁负责完成？谁有权批准？谁必须被咨询？
- 现在最常出现的责任冲突是什么？
usage_prompts:
  decision_relevance_prompt: 在使用《RACI 责任分工分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。用于责任和审批问题。不要把 RACI 用于市场或财务判断。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision
    Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    让用户讲一个具体流程节点，先识别参与角色，再问谁负责/批准。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。生成 RACI，发现多人负责、无人负责、审批权不清、知会过多等问题。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Analysis Workspace，并更新范围、选项、权衡。
    输出必须包含 Choice Delta。 结果优先写入中文 `ANALYSIS_WORKSPACE.md`；独立 Analysis Run 文件仅在 deep / audit 或结果需要单独追溯时创建。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出 A明确单一负责人、B增加审批、C减少审批、D先试运行责任规则。 向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否每格都填满导致形式主义、是否把负责和批准混淆。 检查是否用 Assurance 替代 Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。
    若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 形式主义填表
- Responsible/Accountable 混淆
- 角色过多
- 不连接流程结果
quality_checks:
- 是否明确角色
- 是否识别责任冲突
- 是否有改进选项
- 是否避免过度审批
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- sipoc-bottleneck
- risk-matrix
- option-assessment
example_analysis_run:
- 退款流程二级审批 → RACI 明确客服负责、财务/主管批准、法务咨询。
output_language: zh-CN
runtime_role: professional_analysis
