schema_version: 1
model_id: break-even-analysis
title: 盈亏平衡分析
category: finance-economics
status: ready
purpose:
- 判断需要多少销量、客户数、交易量或收入才能覆盖成本。
- 帮助用户理解规模门槛和成本压力。
use_when:
- 有固定成本、单位收入和单位变动成本线索。
- 用户问“要做到多大才值得”。
avoid_when:
- 成本结构完全不清楚。
- 问题不是经济门槛而是客户需求或流程责任。
decision_questions:
- 需要多少客户/交易才能打平？
- 价格或成本变化如何影响打平点？
- 是否现实可达？
required_inputs:
- 固定成本
- 单位收入
- 单位变动成本
- 目标周期
minimum_viable_inputs:
- 粗略固定成本和单位毛利范围
outputs:
- 盈亏平衡点
- 关键敏感变量
- 是否现实可达
- 需要验证的成本或价格假设
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 6. 重要假设
- 8. 专业分析工作区
- 10. 主要权衡
- 13. 验证方式
interaction_prompts:
- 这个项目每月固定成本大概是多少？
- 单个客户/交易大概能贡献多少毛利？
usage_prompts:
  decision_relevance_prompt: 在使用《盈亏平衡分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。适用于理解规模门槛。若单位毛利或固定成本未知，不要算精确打平点。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    用范围提问：固定成本大概是低/中/高？单位毛利来自历史还是估计？'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。计算或粗估打平点，说明公式和假设，指出敏感变量。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 Analysis Workspace：fixed_cost、unit_revenue、unit_variable_cost、contribution_margin、break_even_units、limitations。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出 A当前可追求、B需提高价格/降成本、C先验证单位毛利、D暂缓投入。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否忽略获客/交付成本、是否把一次性成本和持续成本混淆、是否伪精确。
common_misuses:
- 只看销售额不看毛利
- 忽略固定成本
- 忽略获客成本
- 过度精确
quality_checks:
- 是否有公式
- 是否有成本/毛利来源
- 是否说明敏感变量
- 是否判断现实可达性
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- unit-economics
- scenario-sensitivity
- validation-planning
example_analysis_run:
- 新服务每月固定成本 5 万、每客户毛利 1000 → 约 50 客户打平，需验证获客可达。
output_language: zh-CN
