schema_version: 1
model_id: irr-analysis
title: 内部收益率分析
category: finance-economics
status: ready
purpose:
- 比较有明确现金流项目的回报率。
- 辅助判断投资项目相对吸引力。
use_when:
- 有明确初始投入和未来现金流。
- 需要比较多个投资项目回报率。
- 用户明确关心收益率而非仅净现值。
avoid_when:
- 现金流不明确。
- 现金流多次正负变化导致 IRR 不稳定。
- 早期方向探索或局部规则问题。
decision_questions:
- 项目收益率是否超过资金成本？
- 多个投资项目哪个财务回报率更高？
- IRR 对现金流假设是否敏感？
required_inputs:
- 初始投入
- 期间现金流
- 时间周期
- 资金成本或最低回报要求
minimum_viable_inputs:
- 初始投入和至少两个期间现金流估计
outputs:
- IRR 估计
- 与最低回报要求比较
- 敏感变量
- 不稳定性提示
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Basis / 重要假设
- ANALYSIS_WORKSPACE.md / 专业分析
- Decision Basis / 主要权衡
- Decision Core / 当前推荐
- Decision Memory / 验证方式
interaction_prompts:
- 你关心的是总价值 NPV，还是收益率 IRR？
- 现金流大概每期是多少，来自数据还是估计？
usage_prompts:
  decision_relevance_prompt: 在使用《内部收益率分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。只有在现金流足够明确时使用。若现金流多次变号或输入不足，应谨慎或不用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    先确认是否有初始投入和未来现金流。若没有，不要计算 IRR，建议先做 scenario-sensitivity。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。基于用户现金流估算 IRR，说明输入来源和限制，不得补造现金流。IRR 只能是财务视角。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Analysis Workspace：initial_investment、cash_flows、irr_result、required_return、sensitivity、limitations。
    输出必须包含 Choice Delta。 结果优先写入中文 `ANALYSIS_WORKSPACE.md`；独立 Analysis Run 文件仅在 deep / audit 或结果需要单独追溯时创建。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出推进/缩小投入/补现金流/暂不做财务判断的选择题。 向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否没有现金流仍计算、是否忽略多重 IRR 风险、是否把 IRR 高直接等同应该做。 检查是否用 Assurance
    替代 Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope
    Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 无现金流强算
- 忽略 NPV
- 忽略多重 IRR
- 把收益率当全部决策
quality_checks:
- 是否有现金流
- 是否说明假设来源
- 是否与最低回报比较
- 是否说明限制
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- npv-analysis
- scenario-sensitivity
- risk-matrix
- option-assessment
example_analysis_run:
- 两个投资项目都有现金流预测 → IRR 比较，但同时提醒 NPV 和战略价值差异。
output_language: zh-CN
runtime_role: professional_analysis
