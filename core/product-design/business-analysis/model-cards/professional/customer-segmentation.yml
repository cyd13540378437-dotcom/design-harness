schema_version: 1
model_id: customer-segmentation
title: 客户细分分析
category: customer-market
status: ready
purpose:
- 区分不同客户群的需求、价值、支付意愿、成本和优先级。
- 防止把所有用户混为一个平均用户。
use_when:
- 用户提到客户差异、转化差异、服务成本差异、目标客户选择。
avoid_when:
- 只有单一明确客户群且无需分层。
- 问题是内部流程规则且不涉及客户差异。
decision_questions:
- 哪些客户值得优先服务？
- 不同客户的问题、价值和成本是否不同？
- 当前平均指标是否掩盖分层差异？
required_inputs:
- 客户类型线索
- 使用/购买/付费/服务成本差异
- 至少一个分层维度
minimum_viable_inputs:
- 两个可区分客户群和一个差异线索
outputs:
- 客户分层
- 每层价值与成本
- 优先级
- 需验证假设
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 3. 决策范围
- 4. 关键线索
- 6. 重要假设
- 8. 专业分析工作区
- 9. 可选方案
interaction_prompts:
- 这个问题主要发生在哪类客户身上？
- 有没有一类客户付费好但服务成本高？
usage_prompts:
  decision_relevance_prompt: 在使用《客户细分分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。当平均客户分析不足以支持判断时使用。不要只按人口属性浅分。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    优先用行为、需求、支付意愿和服务成本分层，而非仅公司规模/年龄/地区。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。识别分层维度，描述每层问题、价值、收入、成本、风险和优先级。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 Analysis Workspace 和决策范围/线索/假设/选项。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出 A优先服务某层、B分层策略、C先验证差异、D不分层保持统一。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否按无关属性分层、是否忽略付费者/使用者差异、是否过度切碎客户。
common_misuses:
- 人口属性浅分
- 过度分层
- 忽略支付者
- 平均指标误导
quality_checks:
- 是否有业务相关分层维度
- 是否比较价值/成本
- 是否有优先级
- 是否有验证方式
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- jobs-to-be-done
- willingness-to-pay
- unit-economics
- option-assessment
example_analysis_run:
- 免费用户很多但转化低 → 分层发现小客户使用多但付费弱，中型团队付费更强。
output_language: zh-CN
