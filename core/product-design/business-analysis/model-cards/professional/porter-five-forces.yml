schema_version: 1
model_id: porter-five-forces
title: 波特五力分析
category: strategy-competition
status: ready
purpose:
- 分析行业结构、竞争压力和利润空间。
- 帮助判断进入某市场或行业是否有吸引力。
use_when:
- 新市场进入、行业竞争、平台/供应商/客户议价问题。
avoid_when:
- 局部产品规则或内部流程问题。
- 没有明确行业/市场边界。
decision_questions:
- 行业利润空间受哪些力量压缩？
- 客户/供应商议价强吗？
- 替代方案威胁是什么？
required_inputs:
- 市场边界
- 主要竞争者
- 客户/供应商/替代方案线索
minimum_viable_inputs:
- 明确市场和至少两类竞争力量线索
outputs:
- 五力强弱
- 结构性机会/威胁
- 进入风险
- 策略含义
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 3. 决策范围
- 4. 关键线索
- 8. 专业分析工作区
- 10. 主要权衡
- 11. 反方观点 / 不做会怎样
interaction_prompts:
- 这个市场真正的替代方案是什么？
- 客户是否有很多选择，议价强不强？
usage_prompts:
  decision_relevance_prompt: 在使用《波特五力分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。用于市场/行业结构判断。若市场边界不清，先用 problem-framing。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    先确认市场边界，再逐步问竞争、替代、买方、供应方、新进入者。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。评估五力强弱和对利润/进入策略的含义，标注证据不足处。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 Analysis Workspace，并更新范围、权衡、反方。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出 A进入、B细分切入、C合作/差异化、D暂不进入。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否把竞品功能对比当五力、是否没有替代方案、是否市场边界模糊。
common_misuses:
- 功能竞品表冒充五力
- 忽略替代方案
- 市场边界不清
- 忽略客户议价
quality_checks:
- 是否有市场边界
- 是否覆盖五力
- 是否说明利润影响
- 是否连接选择
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- pestel
- swot-tows
- customer-segmentation
- risk-matrix
example_analysis_run:
- 进入企业协作市场 → 买方议价强、替代方案多、竞争强，建议细分切入。
output_language: zh-CN
