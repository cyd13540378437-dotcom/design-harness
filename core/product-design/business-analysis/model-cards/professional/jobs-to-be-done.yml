schema_version: 1
model_id: jobs-to-be-done
title: Jobs-to-be-Done 分析
category: customer-market
status: ready
purpose:
- 理解客户真正想完成的任务和进步。
- 避免只围绕功能或用户画像讨论需求。
use_when:
- 用户问题涉及客户为什么采用、购买、流失或替代方案。
- 需要理解真实使用动机。
avoid_when:
- 明确财务投资计算。
- 纯内部流程责任问题。
decision_questions:
- 客户到底想完成什么任务？
- 当前替代方案是什么？
- 客户为什么会改变行为或付费？
required_inputs:
- 客户场景
- 当前解决方式
- 触发事件
- 期望结果
- 替代方案
minimum_viable_inputs:
- 一个具体客户案例
outputs:
- 客户任务
- 痛点
- 替代方案
- 价值主张含义
- 验证问题
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Basis / 关键线索
- Decision Basis / 重要假设
- ANALYSIS_WORKSPACE.md / 专业分析
- Decision Core / Choice Set
- Decision Memory / 验证方式
interaction_prompts:
- 能不能讲一个具体客户，他原本想完成什么？
- 如果不用你的产品，他现在怎么解决？
usage_prompts:
  decision_relevance_prompt: 在使用《Jobs-to-be-Done 分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。当需要理解客户动机和价值主张时使用。不要把 JTBD 直接转成财务结论。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    让用户讲具体案例：触发情境、客户任务、当前替代、期望结果、阻碍。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。提取 job、current alternative、desired progress、struggle、value
    hypothesis、switching trigger。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式
    Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Analysis Workspace，并更新线索、假设、选项和验证方式。
    输出必须包含 Choice Delta。 结果优先写入中文 `ANALYSIS_WORKSPACE.md`；独立 Analysis Run 文件仅在 deep / audit 或结果需要单独追溯时创建。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出 A围绕核心 job 优化、B改变目标客户、C验证支付意愿、D暂不做。 向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否把功能当 job、是否忽略替代方案、是否没有具体场景。 检查是否用 Assurance 替代 Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。
    若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 把功能当任务
- 没有替代方案
- 过度抽象
- 不连接验证
quality_checks:
- 是否有具体场景
- 是否有当前替代
- 是否有 desired progress
- 是否生成验证问题
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- customer-segmentation
- willingness-to-pay
- validation-planning
example_analysis_run:
- 企业客户要审计日志 → job 可能是通过采购/合规审查，而不只是查看日志功能。
output_language: zh-CN
runtime_role: professional_analysis
