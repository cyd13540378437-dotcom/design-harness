schema_version: 1
model_id: willingness-to-pay
title: 支付意愿分析
category: pricing-revenue
status: ready
purpose:
- 判断客户是否愿意为某价值付费，以及支付意愿的证据强度。
- 区分喜欢、试用、改变行为、付费、续费。
use_when:
- 定价、付费转化、企业版、功能收费、套餐边界问题。
avoid_when:
- 问题不涉及收入或客户付费。
- 只有内部流程成本问题。
decision_questions:
- 客户愿意为哪部分价值付费？
- 口头兴趣是否能转化为付费行为？
- 价格单位是否匹配价值单位？
required_inputs:
- 目标客户
- 价值主张
- 价格或计费单位
- 客户反馈或报价记录
minimum_viable_inputs:
- 一个客户群和一个价值/价格假设
outputs:
- 支付证据强度
- 价格阻力
- 价值单位匹配
- 验证计划
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 6. 重要假设
- 7. 相关证据
- 8. 专业分析工作区
- 10. 主要权衡
- 13. 验证方式
interaction_prompts:
- 客户是说喜欢，还是已经愿意付费/签试点？
- 客户最愿意为什么结果付费？
usage_prompts:
  decision_relevance_prompt: 在使用《支付意愿分析》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。当决策依赖客户付费意愿时使用。口头喜欢不能等同支付意愿。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    让用户区分：喜欢、试用、改变流程、付费、续费。询问是否有报价或成交证据。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。评估支付意愿证据层级、价格阻力、价值单位和计费单位匹配。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 Analysis Workspace，并更新证据、假设、权衡和验证方式。
  conclusion_prompt: '本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出本模型自己的最终结论。先把模型结果转译为：对当前商业问题的新认识、受影响的业务选项、选项排序变化、证据边界和仍待验证的关键未知。

    输出 A按当前价格推进、B调整计费单位、C做报价测试、D先不商业化。'
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否把口头兴趣当付费、是否忽略购买者/使用者差异、是否没有报价测试。
common_misuses:
- 喜欢等于愿付费
- 忽略购买者
- 忽略预算可预测性
- 没有真实价格测试
quality_checks:
- 是否区分证据层级
- 是否有价值单位
- 是否有验证动作
- 是否说明限制
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- customer-segmentation
- jobs-to-be-done
- unit-economics
- scenario-sensitivity
example_analysis_run:
- 企业客户问审计日志 → 不能直接说明付费意愿，需报价测试。
output_language: zh-CN
