schema_version: 1
model_id: problem-framing
title: 问题界定
category: core-decision
status: ready
purpose:
- 把用户原始输入转成可讨论、可确认、可选择的当前问题。
- 防止后续分析建立在误解或过度收窄的问题上。
use_when:
- 用户输入含糊、范围大或包含多个可能问题。
- 用户表达了一个方案，但背后问题不清楚。
- 高影响问题需要先确认理解。
avoid_when:
- 用户已经明确确认当前问题且没有歧义。
- 只是保存用户原始输入，不进入分析。
decision_questions:
- 用户真正想处理的选择题是什么？
- 当前问题是否被过度收窄？
- 哪些事项暂时不判断？
required_inputs:
- 用户第一次输入原文
- 上下文线索
- 用户是否表达了目标或担忧
minimum_viable_inputs:
- 用户第一次输入原文
outputs:
- Input Understanding Snapshot
- 潜在选择题
- 关键歧义
- 需要确认的理解
case_fields_updated:
- 0. 原始输入
- 1. 当前问题
- 2. 为什么现在需要处理
- 3. 决策范围
- 4. 关键线索
interaction_prompts:
- 我先确认一下我的理解：……这个问题背后可能有 A/B/C 几种选择，你看哪个更接近？
- 你现在更想判断“是否做 X”，还是先判断“为什么出现 Y”？
usage_prompts:
  routing_prompt: '判断当前输入是否需要问题界定。若用户原文存在多个可能解释、多个潜在选择题、或系统准备做高影响分析，则必须使用本模型。

    '
  user_input_prompt: '请用用户语言反馈理解，不要先上专业术语。优先输出 2–4 个可能选择题，让用户确认哪个最接近。

    '
  execution_prompt: '基于原始输入，提取表层问题、潜在选择题、关键歧义、暂不判断事项。不要判断新旧 Case，也不要进入模型分析。

    '
  analysis_run_prompt: '将结果写入 Input Understanding Snapshot，并同步更新 Decision Case 的原始输入、当前问题、关键线索。

    '
  conclusion_prompt: '如果问题仍不清楚，输出理解确认选择题；如果足够清楚，说明带哪个假设继续。

    '
  misuse_guard_prompt: '检查是否过早路由、过早套模型、过度改写用户原意、丢失原始输入。

    '
common_misuses:
- 把用户方案当成真实问题
- 省略原始输入
- 第一步就判断新旧 Case
- 用专业术语压倒用户
quality_checks:
- 是否完整保留原始输入
- 是否至少列出一个潜在选择题
- 是否说明暂不判断事项
- 高影响歧义是否请求确认
combines_well_with:
- decision-routing
- evidence-classification
- option-assessment
example_analysis_run:
- 用户问“要不要做企业版？” → 界定为可能涉及目标客户、产品能力、销售交付和定价模式的选择题。
