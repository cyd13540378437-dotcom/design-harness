schema_version: 1
model_id: problem-framing
title: 问题界定
category: core-decision
status: ready
purpose:
- 把用户原始输入转成可讨论、可确认、可选择的当前问题。
- 防止后续分析建立在误解或过度收窄的问题上。
use_when:
- 用户输入含糊、范围大或包含多个可能问题。
- 用户表达了一个方案，但背后问题不清楚。
- 高影响问题需要先确认理解。
avoid_when:
- 用户已经明确确认当前问题且没有歧义。
- 只是保存用户原始输入，不进入分析。
decision_questions:
- 用户真正想处理的选择题是什么？
- 当前问题是否被过度收窄？
- 哪些事项暂时不判断？
required_inputs:
- 用户第一次输入原文
- 上下文线索
- 用户是否表达了目标或担忧
minimum_viable_inputs:
- 用户第一次输入原文
outputs:
- Input Understanding Snapshot
- 潜在选择题
- 关键歧义
- 需要确认的理解
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 0. 原始输入
- 1. 当前问题
- 2. 为什么现在需要处理
- 3. 决策范围
- 4. 关键线索
interaction_prompts:
- 我先确认一下我的理解：……这个问题背后可能有 A/B/C 几种选择，你看哪个更接近？
- 你现在更想判断“是否做 X”，还是先判断“为什么出现 Y”？
usage_prompts:
  decision_relevance_prompt: 在使用《问题界定》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。判断当前输入是否需要问题界定。若用户原文存在多个可能解释、多个潜在选择题、或系统准备做高影响分析，则必须使用本模型。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    请用用户语言反馈理解，不要先上专业术语。优先输出 2–4 个可能选择题，让用户确认哪个最接近。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。基于原始输入，提取表层问题、潜在选择题、关键歧义、暂不判断事项。不要判断新旧 Case，也不要进入模型分析。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。将结果写入 Input Understanding Snapshot，并同步更新 Decision Case 的原始输入、当前问题、关键线索。
  conclusion_prompt: 本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出最终结论。如果理解仍不清楚，提供中文理解确认；如果足够清楚，只输出已确认商业问题、候选解法与暂不判断事项，不进入方案推荐。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否过早路由、过早套模型、过度改写用户原意、丢失原始输入。
common_misuses:
- 把用户方案当成真实问题
- 省略原始输入
- 第一步就判断新旧 Case
- 用专业术语压倒用户
quality_checks:
- 是否完整保留原始输入
- 是否至少列出一个潜在选择题
- 是否说明暂不判断事项
- 高影响歧义是否请求确认
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- decision-routing
- evidence-classification
- option-assessment
example_analysis_run:
- 用户问“要不要做企业版？” → 界定为可能涉及目标客户、产品能力、销售交付和定价模式的选择题。
output_language: zh-CN
