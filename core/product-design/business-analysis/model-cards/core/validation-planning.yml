schema_version: 1
model_id: validation-planning
title: 验证计划
category: core-decision
status: ready
purpose:
- 在证据不足时设计最低成本、能改变选择的验证方式。
- 把证据缺口转化为 Choice Set 中的一条现实路径，而不是草草收场。
use_when:
- 当前不适合最终决策。
- 关键假设可被低成本验证。
- 用户需要知道下一步做什么。
avoid_when:
- 已经有充分证据且用户只需记录决定。
decision_questions:
- 什么需要验证？
- 用什么最低成本方式验证？
- 成功/失败阈值是什么？
- 验证后做什么选择？
required_inputs:
- 关键假设
- 候选方案
- 可观察指标
- 时间或样本限制
minimum_viable_inputs:
- 一个关键假设和一个可观察信号
outputs:
- 验证动作
- 成功阈值
- 失败阈值
- 复审时间
- 下一次决策点
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Memory / 验证方式
- Decision Memory / 复审条件
- Decision Core / 当前推荐
interaction_prompts:
- 当前最便宜的验证方式是什么？
- 如果两周后只能看一个指标，你会看什么？
usage_prompts:
  decision_relevance_prompt: 在使用《验证计划》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 当关键声明为 provisional、conditional 或 blocked，且验证能够改变选项排序或推荐时使用。不得以全局 block 为前提。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    不要问用户完整研究方案。给出 A访谈、B报价测试、C小试点、D数据回看 等选择。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。围绕关键假设设计验证对象、动作、指标、阈值、时间范围、下一次决策点。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入验证方式、复审条件和当前结论。
    输出必须包含 Choice Delta。 作为 internal_control，quick / standard 默认直接更新 Decision Case 或中央综合，不强制创建独立 Analysis Run；仅 deep / audit
    或确有独立审计价值时落盘。
  conclusion_prompt: 向中央综合器返回验证路径作为现实选项、它会改变哪些 Choice、当前推荐、接受代价和下一次决策点；不直接向用户收尾。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否验证了非关键假设、是否没有阈值、是否无法产生下一次决策。 检查是否用 Assurance 替代 Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。
    若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 设计大而全研究
- 没有成功/失败阈值
- 验证不影响决策
- 把验证计划当最终决定
quality_checks:
- 是否最低成本
- 是否有阈值
- 是否连接关键假设
- 是否有下一决策点
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- assumption-mapping
- decision-assurance
- scenario-sensitivity
example_analysis_run:
- 是否做企业版证据不足 → 先对 5–10 个企业客户做报价测试，观察付费意愿和服务成本。
output_language: zh-CN
runtime_role: internal_control
