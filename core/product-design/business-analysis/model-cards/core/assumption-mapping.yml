schema_version: 1
model_id: assumption-mapping
title: 假设映射
category: core-decision
status: ready
purpose:
- 识别当前结论依赖的关键假设和最脆弱假设。
- 把假设转化为验证重点和复审条件。
use_when:
- 证据不足但需要继续推进。
- 用户有强倾向方案。
- 需要设计验证计划。
avoid_when:
- 事实充分且结论仅是机械记录。
decision_questions:
- 哪些判断其实是假设？
- 哪个假设错了会推翻建议？
- 哪些假设应优先验证？
required_inputs:
- 当前问题
- 候选方案或建议
- 已知事实和证据
minimum_viable_inputs:
- 当前问题和至少一个候选建议
outputs:
- 关键假设列表
- 假设脆弱性
- 验证优先级
- 复审条件
case_fields_updated:
- 6. 重要假设
- 13. 验证方式
- 14. 复审条件
interaction_prompts:
- 这个建议成立，最依赖哪一件事是真的？
- 如果只能验证一个假设，你最想先验证哪一个？
usage_prompts:
  routing_prompt: '当结论依赖多个未验证判断时使用。必须区分假设与事实。

    '
  user_input_prompt: '用“如果这个不成立，建议会不会改变？”帮助用户识别关键假设。

    '
  execution_prompt: '列出假设、为什么需要、如果错了会怎样、验证难度、优先级。

    '
  analysis_run_prompt: '写入重要假设、验证方式和复审条件字段。

    '
  conclusion_prompt: '将最关键假设转成下一步验证选择题。

    '
  misuse_guard_prompt: '检查是否把假设写成事实、是否缺少 if wrong、是否没有验证动作。

    '
common_misuses:
- 假设事实混淆
- 列太多假设不排序
- 没有 if wrong
- 没有验证优先级
quality_checks:
- 是否标明假设状态
- 是否识别最脆弱假设
- 是否连接验证计划
- 是否生成复审条件
combines_well_with:
- validation-planning
- counterfactual-opposition
- scenario-sensitivity
example_analysis_run:
- 企业版成立假设：客户愿意为合规能力付费；若错，企业版只增加复杂度。
