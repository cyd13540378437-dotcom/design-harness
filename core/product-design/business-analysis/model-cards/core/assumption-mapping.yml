schema_version: 1
model_id: assumption-mapping
title: 假设映射
category: core-decision
status: ready
purpose:
- 识别当前结论依赖的关键假设和最脆弱假设。
- 把假设转化为验证重点和复审条件。
use_when:
- 证据不足但需要继续推进。
- 用户有强倾向方案。
- 需要设计验证计划。
avoid_when:
- 事实充分且结论仅是机械记录。
decision_questions:
- 哪些判断其实是假设？
- 哪个假设错了会推翻建议？
- 哪些假设应优先验证？
required_inputs:
- 当前问题
- 候选方案或建议
- 已知事实和证据
minimum_viable_inputs:
- 当前问题和至少一个候选建议
outputs:
- 关键假设列表
- 假设脆弱性
- 验证优先级
- 复审条件
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Basis / 重要假设
- Decision Memory / 验证方式
- Decision Memory / 复审条件
interaction_prompts:
- 这个建议成立，最依赖哪一件事是真的？
- 如果只能验证一个假设，你最想先验证哪一个？
usage_prompts:
  decision_relevance_prompt: 在使用《假设映射》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。当结论依赖多个未验证判断时使用。必须区分假设与事实。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision
    Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    用“如果这个不成立，建议会不会改变？”帮助用户识别关键假设。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。列出假设、为什么需要、如果错了会怎样、验证难度、优先级。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入重要假设、验证方式和复审条件字段。
    输出必须包含 Choice Delta。 作为 internal_control，quick / standard 默认直接更新 Decision Case 或中央综合，不强制创建独立 Analysis Run；仅 deep / audit
    或确有独立审计价值时落盘。
  conclusion_prompt: 本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出。识别会推翻当前业务选择的关键假设，并说明每个假设被证实或证伪时，哪些真实选项会改变。
    向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式
    Schema、公式权重、样例数据、代码或执行提议。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否把假设写成事实、是否缺少 if wrong、是否没有验证动作。 检查是否用 Assurance 替代
    Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope
    Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 假设事实混淆
- 列太多假设不排序
- 没有 if wrong
- 没有验证优先级
quality_checks:
- 是否标明假设状态
- 是否识别最脆弱假设
- 是否连接验证计划
- 是否生成复审条件
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- validation-planning
- counterfactual-opposition
- scenario-sensitivity
example_analysis_run:
- 企业版成立假设：客户愿意为合规能力付费；若错，企业版只增加复杂度。
output_language: zh-CN
runtime_role: internal_control
