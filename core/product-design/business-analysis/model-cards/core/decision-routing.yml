schema_version: 1
model_id: decision-routing
title: 决策路由
category: core-decision
status: ready
purpose:
- 在输入理解后判断该输入应如何进入商业分析系统。
- 记录新 Case、旧 Case 更新、复审、冲突、影响或无需 Case 的内部决策。
use_when:
- 用户理解已确认或系统有明确继续假设。
- 需要判断是否关联已有决策。
- 补充材料可能改变旧结论。
avoid_when:
- 尚未完成输入理解。
- 用户只是闲聊或非业务问题。
decision_questions:
- 这是新 Case 还是旧 Case 的新证据？
- 是否触发旧决策复审？
- 是否与旧决策冲突？
required_inputs:
- Input Understanding Snapshot
- 可用的 Decision Case / Decision Network 索引
- 用户确认或继续假设
minimum_viable_inputs:
- Input Understanding Snapshot
- 至少一个可检查的已有 Case 索引，若没有则说明为空
outputs:
- Analysis Routing Record
- 路由结果
- 候选 Case
- 排除项
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Memory / 关联决策
- Decision Core / 当前推荐
interaction_prompts:
- 这个输入更像是新问题，还是对之前某个决定的新证据？
- 如果它影响旧决定，你希望先复审旧决定，还是先把影响记录下来？
usage_prompts:
  decision_relevance_prompt: 在使用《决策路由》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。只有在输入理解完成后使用。禁止第一步就路由。检查是否存在相关旧 Case 或决策网关系。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    如果路由不确定，向用户展示候选：A 新建 Case；B 并入旧 Case；C 触发旧决策复审。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。基于当前输入和已有 Decision Network，判断路由结果。必须记录候选、选择理由和排除理由。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Analysis Routing
    Record，包含 routing_decision、target_case、reason、alternatives_considered、confidence、next_step。 输出必须包含 Choice Delta。 作为 internal_control，quick
    / standard 默认直接更新 Decision Case 或中央综合，不强制创建独立 Analysis Run；仅 deep / audit 或确有独立审计价值时落盘。
  conclusion_prompt: 本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供内部路由与统一综合使用。若路由本身会改变用户对业务问题的理解才请求确认；否则内部记录后继续。不得让用户承担
    Case、Work Item 或文件管理。 向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否跳过理解确认、是否静默并入旧 Case、是否静默覆盖旧决策。 检查是否用 Assurance 替代
    Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope
    Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 未理解就路由
- 把新证据当新 Case
- 把冲突静默合并
- 不记录排除理由
quality_checks:
- 是否有 routing_decision
- 是否有候选和排除理由
- 是否区分影响、冲突、复审
- 是否需要用户确认
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- problem-framing
- decision-assurance
- validation-planning
example_analysis_run:
- 客户抱怨 Seat 收费不公平 → add_evidence_to_case 或 reopen_existing_decision，而非默认新建 Case。
output_language: zh-CN
runtime_role: internal_control
