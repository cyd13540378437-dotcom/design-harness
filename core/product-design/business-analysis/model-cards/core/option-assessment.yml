schema_version: 1
model_id: option-assessment
title: 方案评估
category: core-decision
runtime_role: internal_control
status: ready
output_language: zh-CN
purpose:
- 比较现实选项的价值、成本、风险、可逆性和适用条件。
- 形成当前推荐、接受的代价和改变推荐的条件。
use_when:
- 已有两个以上可选方案。
- 需要更新选项排序或阶段性推荐。
avoid_when:
- 问题尚未确认且 Choice Set 不应建立。
decision_questions:
- 当前选项如何排序？
- 哪个选项当前最值得推荐？
- 为什么不优先其他方案？
- 什么会改变推荐？
required_inputs:
- 当前决策问题
- Choice Set
- 判断标准
- 事实、假设和证据
minimum_viable_inputs:
- 已确认问题和至少两个现实选项
outputs:
- 选项状态
- 主要权衡
- 当前推荐
- 接受的代价
- 改变推荐的条件
- Choice Delta
case_fields_updated:
- Decision Core / Choice Set
- Decision Core / 当前推荐
- Decision Basis / 主要权衡
interaction_prompts:
- 你最不能接受哪一种代价？
- 哪一个条件会让你改选其他方案？
usage_prompts:
  decision_relevance_prompt: 只有当本评估会改变选项状态、排序、推荐或推荐置信度时使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision
    Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 作为 internal_control，Choice Set 已存在时进行比较；若只有一个方案，先调用选择空间构建。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: 仅在用户偏好或约束会改变排序时，用中文提出最多一个问题。
  execution_prompt: 比较每个选项的 value、cost、risk、reversibility 和 fit conditions；不得只证明用户偏好的方案。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: quick/standard 直接更新 Choice Core 和中央综合；deep/audit 时才单独记录，并明确 Choice Delta。
  conclusion_prompt: 向中央综合器返回选项排序、推荐候选、接受代价、为何不选其他方案、证据边界和改变推荐的条件；不直接向用户收尾。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  misuse_guard_prompt: 检查假二选一、遗漏不做或更小路径、没有推荐、没有代价、用 Assurance 替代 Recommendation。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 假二选一
- 只证明用户喜欢的方案
- 不说明可逆性
- 没有当前推荐
quality_checks:
- 至少两个现实选项
- 有选项生命周期状态
- 有推荐候选
- 有接受代价
- 有改变推荐的条件
- 有 Choice Delta
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- choice-set-construction
- counterfactual-opposition
- assumption-mapping
- risk-matrix
example_analysis_run:
- ARCOS：A先采数据、B纯合成、C规则测试、D双轨冷启动；D成为 conditional 推荐。
