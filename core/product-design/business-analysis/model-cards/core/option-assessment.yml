schema_version: 1
model_id: option-assessment
title: 方案评估
category: core-decision
status: ready
purpose:
- 比较多个现实选择的价值、成本、风险、复杂度和可逆性。
- 将分析结果转成选择题式结论。
use_when:
- 已经有两个以上可选方案。
- 用户问“选 A 还是 B”。
- 系统需要输出阶段性建议。
avoid_when:
- 问题还没界定清楚。
- 原因诊断阶段尚未形成可选方案。
decision_questions:
- 有哪些真实选择？
- 每个选择适合什么情况？
- 代价和风险是什么？
- 是否存在更小选择？
required_inputs:
- 当前问题
- 候选方案
- 目标或判断标准
- 基本事实和假设
minimum_viable_inputs:
- 当前问题和至少两个候选方案
outputs:
- 选项表
- 主要权衡
- 系统推荐
- 需要验证的前提
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 9. 可选方案
- 10. 主要权衡
- 12. 当前结论
- 13. 验证方式
interaction_prompts:
- 除了这个方案，还有没有“不做、先验证、缩小范围”的选项？
- 你最在意的是收入、成本、速度、风险，还是客户体验？
usage_prompts:
  decision_relevance_prompt: 在使用《方案评估》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。当 Case 已有候选方案或需要生成方案时使用。必须包含维持现状、不做或先验证选项，除非明确不适用。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    请让用户选择最关心的权衡维度，而不是让用户填写完整评估表。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。为每个选项比较 value、cost、risk、reversibility、fit conditions。不要只比较用户偏好的方案。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 Analysis Workspace 和 Decision Case 的可选方案、主要权衡、当前结论。
  conclusion_prompt: 本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出。保留当前 Case 中的真实业务选项名称，比较适用条件、价值、代价、风险和可逆性；不得用“继续/暂停/补证据”替代真实业务选项，除非降低不确定性本身就是当前决定。输出系统推荐及其证据边界，但不替用户决定。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否遗漏维持现状、是否假二选一、是否没有代价、是否结论超出证据。
common_misuses:
- 假二选一
- 只证明用户喜欢的方案
- 忽略不做/先验证
- 不说明可逆性
quality_checks:
- 是否至少两个真实方案
- 是否有 no-action/validation option
- 是否说明代价和可逆性
- 是否区分推荐和决定
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- counterfactual-opposition
- assumption-mapping
- validation-planning
- risk-matrix
example_analysis_run:
- Seat 计费问题 → A按 Seat、B按 Workspace、C按使用量、D先做报价测试。
output_language: zh-CN
