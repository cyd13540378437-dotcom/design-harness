schema_version: 1
model_id: decision-assurance
title: 决策质量保障
category: core-decision
status: ready
purpose:
- 在输出阶段性结论前检查逻辑、证据、模型适配、反方、验证和复审条件。
- 防止低质量结论被包装成专业建议。
use_when:
- 每次准备输出阶段性结论前。
- 高影响决策确认前。
- 模型分析完成后。
avoid_when:
- 没有形成任何结论，只做原始输入保存时。
decision_questions:
- 当前结论是否可输出？
- 是 pass、warn 还是 block？
- 哪些内容必须补齐？
required_inputs:
- Decision Case 当前版本
- Analysis Runs
- 反方分析
- 模型选择记录
minimum_viable_inputs:
- Decision Case 当前版本
outputs:
- Decision Assurance Check
- pass/warn/block
- 阻塞项或限制说明
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 12. 当前结论
- 13. 验证方式
- 14. 复审条件
interaction_prompts:
- 当前我只能给临时建议，还是已经可以做选择？
- 这项结论是否需要你明确确认？
usage_prompts:
  decision_relevance_prompt: 在使用《决策质量保障》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。任何阶段性结论前必须使用。若高影响且用户未确认，不得 pass 为最终决定。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    如果需要用户补充，输出最少 1–2 个关键问题，不要抛出完整检查清单。'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。按 checklist 检查问题、原始输入、事实假设、真实选项、反方、模型适配、证据强度、结论边界、验证、复审、人类确认。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 DECISION_ASSURANCE_CHECK，并将结果摘要写入 Decision Process Package。
  conclusion_prompt: 本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出。输出 pass/warn/block、允许的结论强度、必须披露的限制和是否需要人类确认。若 block，只允许综合器提出与当前商业问题直接相关的下一步选择。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否把 warn 当 pass、是否在 block 时给最终建议、是否遗漏用户确认。
common_misuses:
- 形式化打勾
- block 后仍给最终建议
- 不检查原始输入
- 不检查模型误用
quality_checks:
- 是否有 pass/warn/block
- 是否有理由
- 是否有 allowed output
- 是否识别人类确认
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- counterfactual-opposition
- validation-planning
- decision-routing
example_analysis_run:
- 缺少现金流却要 NPV 结论 → block，允许输出“先补现金流/改用情景分析”的选择。
output_language: zh-CN
