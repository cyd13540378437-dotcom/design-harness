schema_version: 1
model_id: decision-assurance
title: 决策质量保障
category: core-decision
runtime_role: internal_control
status: ready
output_language: zh-CN
purpose:
- 检查 Choice Set、推荐、证据边界、反方和人类决定是否形成可负责的阶段性结论。
- 将证据限制拆成 Claim-level Assurance，防止全局 block 替代推荐。
use_when:
- 每次准备输出阶段性结论前。
- 高影响决策确认前。
- 新证据可能改变推荐强度时。
avoid_when:
- 只保存原始输入且尚未形成任何 Choice Set 时。
decision_questions:
- 哪些声明 supported / provisional / conditional / blocked？
- 整体成熟度是 pass、warn 还是 partial？
- 当前推荐能以什么强度表达？
required_inputs:
- Decision Case Choice Core
- 当前推荐
- 关键声明
- 反方分析
- 证据边界
minimum_viable_inputs:
- Choice Set、当前推荐和至少一个关键声明
outputs:
- Claim-level Assurance
- 整体 pass/warn/partial
- 允许与禁止表述
- No Dead-End 检查
- Choice Delta
case_fields_updated:
- Decision Core / Claim-level Assurance
- Decision Core / 当前推荐
- Decision Memory / 复审条件
interaction_prompts:
- 当前推荐可以直接采用，还是只能在某个条件下采用？
- 哪一项声明现在还不能对外说？
usage_prompts:
  decision_relevance_prompt: 本控制必须说明 Assurance 是否会改变推荐强度、选项状态或允许表述；若不会，只做轻量检查。 若 choice_loop_status=closed，除正式 review_signal
    外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 任何阶段性结论前执行。不得生成 Case 级全局 block；把缺口拆成具体 blocked claims。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: 仅当一个用户回答会改变推荐状态或某项声明的 Assurance 时，最多提出一个中文问题。
  execution_prompt: 检查 Choice Set、Recommendation Obligation、反方、证据边界、改变推荐的条件和人类决定。对每个关键声明标记 supported/provisional/conditional/blocked，并给出整体
    pass/warn/partial。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 作为 internal_control，quick/standard 直接更新 Decision Case、Summary 或 Assurance 摘要，不强制创建独立 Analysis Run；deep/audit
    时记录 Choice Delta。
  conclusion_prompt: 只向中央综合器返回整体成熟度、声明级状态、允许表述、当前推荐强度和改变推荐的条件。即使存在 blocked claim，也必须保留现实 Choice Set 和当前推荐，不直接向用户收尾。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  misuse_guard_prompt: 检查是否用 Assurance 替代 Recommendation，是否把具体 blocked claim 扩大成整个 Case block，是否只要求补材料而没有现实路径。 若 choice_loop_status=closed，除正式
    review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 形式化打勾
- 把缺少最高等级证据写成整个 Case 无法继续
- 不提供推荐
- 把 provisional 推荐写成 confirmed
quality_checks:
- 是否有真实 Choice Set
- 是否有当前推荐
- 是否逐声明标记 Assurance
- 是否有允许/禁止表述
- 是否通过 No Dead-End
- 是否允许用户接受/拒绝/修改/暂缓
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- counterfactual-opposition
- validation-planning
- choice-set-construction
example_analysis_run:
- ARCOS：实验框架 supported，合成相对比较 provisional，当前策略比较 conditional，真实效果 blocked；整体 partial，仍推荐双轨冷启动。
