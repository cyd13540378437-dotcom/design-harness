schema_version: 1
model_id: evidence-classification
title: 证据分类
category: core-decision
status: ready
purpose:
- 把用户输入和补充材料拆成线索、事实、假设、证据、解释、偏好和约束。
- 防止把假设写成事实，把偏好写成结论。
use_when:
- 用户补充文字、数据、附件、案例或客户反馈。
- 当前结论需要证据强度说明。
avoid_when:
- 没有任何新输入或材料。
decision_questions:
- 哪些是真实事实？
- 哪些只是解释或假设？
- 哪些证据支持或反驳某判断？
required_inputs:
- 用户输入或补充材料
- 当前 Case 范围
minimum_viable_inputs:
- 一段用户文字或一个材料摘要
outputs:
- Evidence Intake Record
- 已知事实
- 关键假设
- 相关证据
- 证据强度和限制
- Decision Delta
- 对当前业务选择的 Decision Delta
case_fields_updated:
- 4. 关键线索
- 5. 已知事实
- 6. 重要假设
- 7. 相关证据
interaction_prompts:
- 你这条信息更像是一个具体事实，还是你对原因的判断？
- 有没有一个具体数据或客户案例能支持这个判断？
usage_prompts:
  decision_relevance_prompt: 在使用《证据分类》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文 Decision Delta。
  routing_prompt: 仅作内部适配判断。当任何新材料进入 Case 时使用。若材料和当前 Case 相关性低，必须触发边界提醒。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    请不要要求用户分类。先由系统分类，再让用户纠正：“我把这条当作事实/假设/线索处理，对吗？”'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。将材料拆成 clue、fact、assumption、evidence、interpretation、preference、constraint，并说明来源和可信度。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、decision_delta、limitations 和 confidence。写入 Evidence Intake Record，并更新 Decision Case 对应字段。相关性低时记录 discard/weak signal/new case。
  conclusion_prompt: 本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出。说明新材料如何改变事实、假设、证据强度或选项排序；不能造成 Decision Delta 的材料只作为弱相关线索保留。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Decision Delta、伪精确和越界进入产品/技术设计。检查是否把用户感觉写成事实、是否把单个案例过度泛化、是否忽略证据限制。
common_misuses:
- 把线索当事实
- 把解释当证据
- 忽略来源和日期
- 相关性低仍强行采用
quality_checks:
- 是否分类清楚
- 是否记录来源
- 是否说明限制
- 是否处理低相关材料
- 是否说明本模型对当前业务选择产生了什么 Decision Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Decision Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
combines_well_with:
- problem-framing
- assumption-mapping
- decision-assurance
example_analysis_run:
- “客户说贵” → 线索；“12 个客户在销售中提出预算异议” → 事实/证据；“客户不愿付费” → 假设。
output_language: zh-CN
