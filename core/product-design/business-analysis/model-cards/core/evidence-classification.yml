schema_version: 1
model_id: evidence-classification
title: 证据分类
category: core-decision
status: ready
purpose:
- 把用户输入和补充材料拆成线索、事实、假设、证据、解释、偏好和约束。
- 防止把假设写成事实，把偏好写成结论。
use_when:
- 用户补充文字、数据、附件、案例或客户反馈。
- 当前结论需要证据强度说明。
avoid_when:
- 没有任何新输入或材料。
decision_questions:
- 哪些是真实事实？
- 哪些只是解释或假设？
- 哪些证据支持或反驳某判断？
required_inputs:
- 用户输入或补充材料
- 当前 Case 范围
minimum_viable_inputs:
- 一段用户文字或一个材料摘要
outputs:
- Evidence Intake Record
- 已知事实
- 关键假设
- 相关证据
- 证据强度和限制
- Choice Delta
- 对当前业务选择的 Choice Delta
case_fields_updated:
- Decision Basis / 关键线索
- Decision Basis / 已知事实
- Decision Basis / 重要假设
- Decision Basis / 相关证据
interaction_prompts:
- 你这条信息更像是一个具体事实，还是你对原因的判断？
- 有没有一个具体数据或客户案例能支持这个判断？
usage_prompts:
  decision_relevance_prompt: 在使用《证据分类》前，先恢复当前 Decision Anchor。明确本模型试图降低哪个关键不确定性，以及不同分析结果会让哪个业务选项更强、更弱、被排除或变成有条件成立。如果结果不会改变选项排序、风险、阈值、投入方式或是否继续，则停止使用本模型。分析结束后必须输出中文
    Choice Delta。 在执行前必须明确本模型会改变 Choice Set、选项后果、当前推荐或推荐置信度中的哪一项；若不会，停止使用。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  routing_prompt: 仅作内部适配判断。当任何新材料进入 Case 时使用。若材料和当前 Case 相关性低，必须触发边界提醒。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  user_input_prompt: '仅当缺少会改变当前业务选项排序或风险判断的关键输入时使用；一次最多用简体中文提出 1–2 个问题。只有当缺失信息会改变业务选项排序、风险判断、成功阈值或是否现在决策时，才向用户提问。不要为了填满模型字段而提问。

    请不要要求用户分类。先由系统分类，再让用户纠正：“我把这条当作事实/假设/线索处理，对吗？”'
  execution_prompt: 只使用当前 Case 已接纳的事实、假设和证据执行分析；不得扩大问题边界或进入无关实施设计。将材料拆成 clue、fact、assumption、evidence、interpretation、preference、constraint，并说明来源和可信度。
    若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  analysis_run_prompt: 用简体中文写入 Analysis Run，必须包含 decision_relevance、choice_delta、limitations 和 confidence。写入 Evidence Intake
    Record，并更新 Decision Case 对应字段。相关性低时记录 discard/weak signal/new case。 输出必须包含 Choice Delta。 作为 internal_control，quick / standard
    默认直接更新 Decision Case 或中央综合，不强制创建独立 Analysis Run；仅 deep / audit 或确有独立审计价值时落盘。
  conclusion_prompt: 本 Prompt 只向中央决策综合器返回候选含义，不得直接向用户输出最终建议或结束对话。本提示只供统一决策综合器内部使用，不得直接向用户输出。说明新材料如何改变事实、假设、证据强度或选项排序；不能造成
    Choice Delta 的材料只作为弱相关线索保留。 向中央综合器返回受影响选项、推荐候选、接受的代价、证据边界和改变推荐的条件。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过
    Decision Scope Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
  misuse_guard_prompt: 检查问题漂移、解法前提未挑战、无 Choice Delta、伪精确和越界进入产品/技术设计。检查是否把用户感觉写成事实、是否把单个案例过度泛化、是否忽略证据限制。 检查是否用 Assurance 替代
    Recommendation，或因证据不足只要求用户补材料而没有给出当前现实路径。 若 choice_loop_status=closed，除正式 review_signal 外必须停止使用本模型；不得越过 Decision Scope
    Lock；不得生成实施步骤、正式 Schema、公式权重、样例数据、代码或执行提议。
common_misuses:
- 把线索当事实
- 把解释当证据
- 忽略来源和日期
- 相关性低仍强行采用
quality_checks:
- 是否分类清楚
- 是否记录来源
- 是否说明限制
- 是否处理低相关材料
- 是否说明本模型对当前业务选择产生了什么 Choice Delta
- 低相关结果是否被排除出用户可见结论
- 是否保持当前 Decision Anchor
- 是否产生可说明的 Choice Delta
- 是否以中文写入 Analysis Run
- 是否仅向中央综合器提供结论素材
- 是否形成或更新了真实 Choice Set
- 是否产生可说明的 Choice Delta
- 是否向中央综合器提供推荐候选与改变推荐的条件
- Choice Loop 关闭后是否停止运行模型
- 是否遵守 Decision Scope Lock
- 是否避免实施产物与执行提议
combines_well_with:
- problem-framing
- assumption-mapping
- decision-assurance
example_analysis_run:
- “客户说贵” → 线索；“12 个客户在销售中提出预算异议” → 事实/证据；“客户不愿付费” → 假设。
output_language: zh-CN
runtime_role: internal_control
