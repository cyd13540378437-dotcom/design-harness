schema_version: 1
capability_id: product-business-analysis
display_name: 商业分析能力集群
version: v0.1.2-alpha
status: implementation-ready
agent_neutral: true
standalone: true
primary_language: zh-CN
stable_identifiers_language: en
language_contract:
  user_visible_default: zh-CN
  project_markdown_required: zh-CN
  runtime_instruction_languages_allowed:
  - zh-CN
  - en
  machine_keys_language: en
  english_output_may_replace_chinese: false
architecture:
  layers:
  - DesignHarnessAgent Core
  - Agent Runtime Adapters
  - Project Knowledge Assets
  operational_domains:
  - orchestration_and_routing
  - core_decision_analysis
  - review_risk_and_decision_memory
  - intake_extraction_and_assurance
  - human_decision_control_plane
  passive_trigger_interface: not_implemented
  project_assets_root: docs/product/business-analysis
entry_modes:
- direct_decision_support
- case_continuation
- evidence_intake
- decision_review
- project_decision_extraction
- assurance_validation
- case_summary
follow_up_turn_types:
- new_input
- clarification
- user_confirmation
- evidence_update
- human_decision
- summary_request
- review_signal
- scope_change
- new_case_candidate
routing_results:
- create_new_case
- continue_existing_case
- add_evidence_to_case
- record_human_decision
- summarize_existing_case
- reopen_existing_decision
- conflict_with_existing_decision
- impact_existing_decision
- no_case_needed
analysis_depths:
- quick
- standard
- deep
decision_case_fields:
- original_input
- current_problem_and_decision_anchor
- why_now
- decision_scope_and_solution_premise
- key_clues
- known_facts
- key_assumptions
- related_evidence
- analysis_workspace
- options
- tradeoffs
- counterfactual_opposition
- current_conclusion
- validation_plan
- review_triggers
- related_decisions
decision_network_relations:
- depends_on
- affects
- conflicts_with
- supersedes
- reopens
knowledge_statuses:
- draft
- provisional
- confirmed
- needs_review
- stale
- superseded
- deprecated
- sealed
assurance_results:
- pass
- warn
- block
model_prompt_contract:
- decision_relevance_prompt
- routing_prompt
- user_input_prompt
- execution_prompt
- analysis_run_prompt
- conclusion_prompt
- misuse_guard_prompt
project_assets:
  long_lived:
  - docs/product/business-analysis/BUSINESS_ANALYSIS_INDEX.md
  - docs/product/business-analysis/BUSINESS_ANALYSIS_INDEX.yml
  - docs/product/business-analysis/BUSINESS_ANALYSIS_WORK_ITEMS.md
  - docs/product/business-analysis/decision-cases/
  - docs/product/business-analysis/decision-network/DECISION_NETWORK.md
  - docs/product/business-analysis/decision-network/DECISION_NETWORK.yml
  - docs/product/business-analysis/evidence/EVIDENCE_LEDGER.md
  - docs/product/business-analysis/evidence/EVIDENCE_LEDGER.yml
  - docs/product/business-analysis/reviews/
  work_item_root:
  - STATE.md
  - ANALYSIS_CONSUMPTION.md
  - ANALYSIS_OUTPUT.md
  - DECISION_NOTES.md
  - DECISION_SUMMARY.md
  - DECISION_PROCESS_PACKAGE.md
  work_item_artifacts:
  - INPUT_UNDERSTANDING_SNAPSHOT.md
  - TURN_CONTINUITY_CHECK.md
  - ANALYSIS_ROUTING_RECORD.md
  - EVIDENCE_INTAKE_RECORD.md
  - MODEL_SELECTION_RECORD.md
  - ANALYSIS_RUNS.md
  - DECISION_ASSURANCE_CHECK.md
  - DECISION_SYNTHESIS.md
  - DECISION_NETWORK_UPDATE.md
independence_contract:
  depends_on_other_capabilities: false
  modifies_other_capabilities: false
  emits_cross_capability_triggers: false
  generates_downstream_views: false
  uses_shared_work_item_directory: false
non_goals:
- cross-capability-trigger
- cross-capability-impact-propagation
- downstream-view-compilation
- shared-product-work-item-index
- CLI
- Hook
- Plugin
- Marketplace
- installer
- external-runtime-dependency
