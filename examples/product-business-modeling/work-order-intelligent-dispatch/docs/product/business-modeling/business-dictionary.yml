terms_not_to_use:
- term: Asset / Facility
  reason: 复合对象身份不清；本模型使用 MaintainableAsset 与 ServiceLocation。
  preferred_term: MaintainableAsset 与 ServiceLocation
- term: 到达成本是 ServiceLocation 固有属性
  reason: 到达成本依赖资源起点、时间和通行条件，应属于 DispatchCandidate 或关系上下文。
  preferred_term: DispatchCandidate.estimated_arrival_cost
- term: current_executor_id
  reason: 技术字段，不是核心业务属性。
  preferred_term: 当前执行责任或 Assignment
