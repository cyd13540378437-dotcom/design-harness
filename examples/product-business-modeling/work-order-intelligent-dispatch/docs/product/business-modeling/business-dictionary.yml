schema_version: 1
business_model_version: v0.1-provisional
status: provisional
business_domains:
- id: service_demand
  label: 服务需求
  description: 承载工单、服务承诺和可调度要求。
  status: provisional
- id: facility_context
  label: 设备设施上下文
  description: 描述可维护资产与服务位置。
  status: provisional
- id: resource_capacity
  label: 资源能力与容量
  description: 描述资源、能力和可用性。
  status: provisional
- id: dispatch_decisioning
  label: 调度决策
  description: 描述策略、候选、决策与执行责任。
  status: provisional
- id: execution_feedback
  label: 执行反馈
  description: 描述实际执行过程和结果。
  status: provisional
- id: strategy_evaluation
  label: 策略评估
  description: 描述决策回放与效果证据。
  status: provisional
object_categories:
- id: process_carrier
  label: 流程承载类
  description: 承载主要业务流程。
  status: provisional
- id: core_business_object
  label: 核心业务对象类
  description: 被服务或维护的核心对象。
  status: provisional
- id: context_object
  label: 业务上下文类
  description: 提供位置或环境约束。
  status: provisional
- id: requirement_object
  label: 要求表达类
  description: 把需求转成可判断约束。
  status: provisional
- id: participant_resource
  label: 参与资源类
  description: 承担业务责任的资源。
  status: provisional
- id: capability_object
  label: 能力类
  description: 表达可胜任条件。
  status: provisional
- id: capacity_object
  label: 容量类
  description: 表达时间与承诺容量。
  status: provisional
- id: policy_object
  label: 策略规则类
  description: 表达过滤、排序与护栏。
  status: provisional
- id: candidate_object
  label: 候选方案类
  description: 承载可比较方案。
  status: provisional
- id: decision_object
  label: 业务决策类
  description: 承载推荐、确认与覆盖。
  status: provisional
- id: commitment_object
  label: 责任承诺类
  description: 承载已形成的执行责任。
  status: provisional
- id: event_record
  label: 事件记录类
  description: 记录实际执行事实。
  status: provisional
- id: evidence_object
  label: 证据类
  description: 保存可回放评估证据。
  status: provisional
business_objects:
- id: work_order
  name: WorkOrder
  label: 工单
  definition: 承载一次设备设施服务需求、服务承诺和业务进展的流程对象；不等同于执行记录。
  business_domain_id: service_demand
  object_category_id: process_carrier
  status: provisional
- id: maintainable_asset
  name: MaintainableAsset
  label: 可维护资产
  definition: 被维护或服务的设备、系统或设施构件；不包含空间位置本身。
  business_domain_id: facility_context
  object_category_id: core_business_object
  status: provisional
- id: service_location
  name: ServiceLocation
  label: 服务位置
  definition: 服务发生的空间、区域和通行上下文；不固有包含从某个资源出发的到达成本。
  business_domain_id: facility_context
  object_category_id: context_object
  status: provisional
- id: work_requirement
  name: WorkRequirement
  label: 工单要求
  definition: 把工单需求转化为能力、资质、安全、工具和时间约束的要求对象。
  business_domain_id: service_demand
  object_category_id: requirement_object
  status: provisional
- id: service_resource
  name: ServiceResource
  label: 服务资源
  definition: 可承担工单执行责任的资源抽象；第一期可覆盖个人、班组、岗位和外包资源，具体身份仍待确认。
  business_domain_id: resource_capacity
  object_category_id: participant_resource
  status: provisional
- id: capability
  name: Capability
  label: 能力
  definition: 资源胜任某类服务的业务能力及等级约束；不等同于证书文件或技能字段。
  business_domain_id: resource_capacity
  object_category_id: capability_object
  status: provisional
- id: resource_availability
  name: ResourceAvailability
  label: 资源可用性
  definition: 某个服务资源在特定时段可被业务承诺的容量与限制。
  business_domain_id: resource_capacity
  object_category_id: capacity_object
  status: provisional
- id: dispatch_policy
  name: DispatchPolicy
  label: 调度策略
  definition: 用于候选过滤、排序和护栏判断的业务策略，不是算法代码。
  business_domain_id: dispatch_decisioning
  object_category_id: policy_object
  status: provisional
- id: dispatch_candidate
  name: DispatchCandidate
  label: 派工候选
  definition: 由工单、资源、候选开始窗口和上下文评估组成的可比较派工方案。
  business_domain_id: dispatch_decisioning
  object_category_id: candidate_object
  status: provisional
- id: dispatch_decision
  name: DispatchDecision
  label: 派工决策
  definition: 记录推荐、人工确认、覆盖、拒绝和提交理由的业务决策。
  business_domain_id: dispatch_decisioning
  object_category_id: decision_object
  status: provisional
- id: assignment
  name: Assignment
  label: 派工责任
  definition: 派工决策提交后形成的执行责任与承诺。
  business_domain_id: dispatch_decisioning
  object_category_id: commitment_object
  status: provisional
- id: execution_record
  name: ExecutionRecord
  label: 执行记录
  definition: 记录实际开始、完成、异常、质量和重派结果的执行事实。
  business_domain_id: execution_feedback
  object_category_id: event_record
  status: provisional
- id: dispatch_evaluation_snapshot
  name: DispatchEvaluationSnapshot
  label: 调度评估快照
  definition: 保存候选集合、排序、最终选择和执行反馈的可回放策略评估证据。
  business_domain_id: strategy_evaluation
  object_category_id: evidence_object
  status: provisional
