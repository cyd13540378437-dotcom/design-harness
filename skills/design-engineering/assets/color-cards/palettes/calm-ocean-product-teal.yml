schema_version: 1
id: calm-ocean-product-teal
title: 冷静海洋蓝绿
source_image: ../images/calm-ocean-product-teal.png
colors:
- role: primary
  name: 深海蓝绿
  hex: '#005D7A'
  usage: 主按钮、关键导航、重要标题或深色信息锚点
- role: secondary
  name: 清透湖青
  hex: '#0FA3B1'
  usage: 次级行动、链接、图表主系列或模块重点
- role: accent
  name: 流动蓝绿
  hex: '#40B7A8'
  usage: 状态反馈、局部强调、插画点缀或关键数字高亮
- role: soft_background
  name: 浅水青蓝
  hex: '#93D9D0'
  usage: 卡片浅底、空状态、标签底色或轻量分区
- role: page_background
  name: 雾白水蓝
  hex: '#EEF8F7'
  usage: 页面底色、低噪音背景或大面积留白区域
token_suggestions:
  color.primary: primary
  color.secondary: secondary
  color.accent: accent
  color.surface.tint: soft_background
  color.background: page_background
token_hint: 深海蓝绿做主行动，湖青做状态反馈，雾白水蓝做低噪背景。
accessibility_notes:
- 中等风险：浅色底上的彩色小字、细线和禁用态需要单独验证对比度。
- 主 CTA 建议优先使用最深色阶或高饱和强调色，避免只用浅色承担关键行动。
