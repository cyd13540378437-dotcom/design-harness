schema_version: 1
id: soft-sage-productivity
title: 柔和鼠尾草效率
source_image: ../images/soft-sage-productivity.png
colors:
- role: primary
  name: 鼠尾草深绿
  hex: '#4D6B5B'
  usage: 主按钮、关键导航、重要标题或深色信息锚点
- role: secondary
  name: 稳定草本绿
  hex: '#7F9A83'
  usage: 次级行动、链接、图表主系列或模块重点
- role: accent
  name: 轻效率绿
  hex: '#B9C8B5'
  usage: 状态反馈、局部强调、插画点缀或关键数字高亮
- role: soft_background
  name: 浅鼠尾草底
  hex: '#E2E8DD'
  usage: 卡片浅底、空状态、标签底色或轻量分区
- role: page_background
  name: 雾白自然底
  hex: '#FAFBF7'
  usage: 页面底色、低噪音背景或大面积留白区域
token_suggestions:
  color.primary: primary
  color.secondary: secondary
  color.accent: accent
  color.surface.tint: soft_background
  color.background: page_background
token_hint: 鼠尾草深绿做主行动，草本绿做完成状态，浅绿底降低长期使用压力。
accessibility_notes:
- 整体对比风险较低，但浅底上的次级文字仍需检查 WCAG 对比度。
- 大面积浅色背景应搭配足够深的正文色，避免低饱和灰字过淡。
