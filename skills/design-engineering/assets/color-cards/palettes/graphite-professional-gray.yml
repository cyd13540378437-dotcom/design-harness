schema_version: 1
id: graphite-professional-gray
title: 石墨专业灰
source_image: ../images/graphite-professional-gray.png
colors:
- role: primary
  name: 石墨黑灰
  hex: '#1F2933'
  usage: 主按钮、关键导航、重要标题或深色信息锚点
- role: secondary
  name: 专业 slate 灰
  hex: '#3E4C59'
  usage: 次级行动、链接、图表主系列或模块重点
- role: accent
  name: 信息中灰蓝
  hex: '#66788A'
  usage: 状态反馈、局部强调、插画点缀或关键数字高亮
- role: soft_background
  name: 浅钢蓝灰
  hex: '#D6DEE6'
  usage: 卡片浅底、空状态、标签底色或轻量分区
- role: page_background
  name: 低噪冷白灰
  hex: '#F6F8FA'
  usage: 页面底色、低噪音背景或大面积留白区域
token_suggestions:
  color.primary: primary
  color.secondary: secondary
  color.accent: accent
  color.surface.tint: soft_background
  color.background: page_background
token_hint: 石墨灰做文字和导航，中灰蓝做层级，冷白灰做工具型页面底。
accessibility_notes:
- 中等风险：浅色底上的彩色小字、细线和禁用态需要单独验证对比度。
- 主 CTA 建议优先使用最深色阶或高饱和强调色，避免只用浅色承担关键行动。
