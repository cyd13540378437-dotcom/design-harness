interface:
  display_name: "Design Engineering"
  short_description: "交互式 UX/PD 生命周期事件、Project Memory、参考库与色卡消费、原型实现、上下文绑定终审和交付归档"
  default_prompt: "使用 $design-engineering 推进当前产品设计任务。先解析或恢复 Work Item / Lifecycle Event，读取 Project Memory，再按适用 Gate 完成参考解析、配色与字体确认、设计禁区、原型、实现、Context-bound Final Review、outputs 归档和关闭确认。"

policy:
  allow_implicit_invocation: true
